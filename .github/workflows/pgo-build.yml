  # llvm-bolt Bin/Release/SvtAv1EncApp -o Bin/Release/SvtAv1EncApp.bolt -data=SolLevante/perf.fdata --relocs --remove-symtab --eliminate-unreachable --hugify --align-blocks --reorder-blocks=ext-tsp --reorder-functions-use-hot-size --use-edge-counts --min-branch-clusters --split-functions --split-strategy=profile2 --split-eh --split-all-cold --frame-opt=all --frame-opt-rm-stores --reg-reassign --use-aggr-reg-reassign --inline-memcpy --inline-ap --shorten-instructions --infer-fall-throughs --infer-stale-profile --equalize-bb-counts --iterative-guess --indirect-call-promotion=all --indirect-call-promotion-use-mispredicts --icp-eliminate-loads --jump-tables=aggressive --simplify-rodata-loads --plt=all --icf=1 --peepholes=all --eliminate-unreachable --elim-link-veneers --group-stubs --fix-block-counts --fix-func-counts --match-profile-with-function-hash --match-with-call-graph --use-compact-aligner --preserve-blocks-alignment --x86-align-branch-boundary-hot-only --x86-strip-redundant-address-size --tail-duplication=cache --simplify-conditional-tail-calls --sctc-mode=heuristic --dyno-stats --icp-mp-threshold=1
  # ```
  build-linux-x86-64:
    needs: [tag, release]
    runs-on: "ubuntu-latest"
    steps:
    - uses: ConorMacBride/install-package@v1
      with:
        apt: neofetch
    - run: neofetch
    - uses: actions/checkout@v7
    - uses: actions/checkout@v7
      with:
        path: SolLevante
        ref: sollevante
    - run: xz --decompress SolLevante/SolLevante.y4m.xz
    - uses: ilammy/setup-nasm@v1
    - uses: ZhongRuoyu/setup-llvm@v0
    - uses: dtolnay/rust-toolchain@stable
    - uses: cargo-bins/cargo-binstall@main
    - run: cargo binstall cargo-c
    - uses: actions/checkout@v7
      with:
        path: dovi_tool
        repository: quietvoid/dovi_tool
    - run: cd dovi_tool/dolby_vision && cargo cinstall --verbose --release --library-type staticlib --prefix "$(realpath ../../rustlibs)" && cd ../..
    - uses: actions/checkout@v7
      with:
        path: hdr10plus_tool
        repository: quietvoid/hdr10plus_tool
    - run: cd hdr10plus_tool/hdr10plus && cargo cinstall --verbose --release --library-type staticlib --prefix "$(realpath ../../rustlibs)" && cd ../..
    - run: ls rustlibs/lib
    - run: ls rustlibs/lib/pkgconfig
    - run: cat rustlibs/lib/pkgconfig/dovi.pc
  #   - id: build-avx512
  #     run: CFLAGS="-flto=full -march=icelake-server -mtune=znver5 -fno-exceptions -fno-rtti -DNDEBUG" CPPFLAGS="-flto=full -march=icelake-server -mtune=znver5 -fno-exceptions -fno-rtti -DNDEBUG" LDFLAGS="-fuse-ld=lld -flto=full" Build/linux/build.sh --verbose --static --release --disable-native --enable-avx512 --disable-lto --enable-pgo --pgo-videos="$(realpath SolLevante)"
  #     continue-on-error: true
  #   - run: Bin/Release/SvtAv1EncApp -i SolLevante/SolLevante.y4m -b /dev/null --preset 4 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
  #     if: ${{ steps.build-avx512.outcome != 'failure' }}
  #   - run: cd Bin/Release && tar cJf Linux_x86-64_icelake-server+znver5.tar.xz SvtAv1EncApp && cd ../..
  #     if: ${{ steps.build-avx512.outcome != 'failure' }}
  #   - uses: softprops/action-gh-release@v3
  #     with:
  #       tag_name: ${{ needs.tag.outputs.tag }}
  #       files: Bin/Release/Linux_x86-64_icelake-server+znver5.tar.xz
  #     if: ${{ steps.build-avx512.outcome != 'failure' }}
  #   - run: Build/linux/build.sh --clean
  #   - id: build-znver2
  #     run: CFLAGS="-flto=full -march=znver2 -mtune=znver2 -fno-exceptions -fno-rtti -DNDEBUG" CPPFLAGS="-flto=full -march=znver2 -mtune=znver2 -fno-exceptions -fno-rtti -DNDEBUG" LDFLAGS="-fuse-ld=lld -flto=full" Build/linux/build.sh --verbose --static --release --disable-native --enable-avx512 --disable-lto --enable-pgo --pgo-videos="$(realpath SolLevante)"
  #     continue-on-error: true
  #   - run: Bin/Release/SvtAv1EncApp -i SolLevante/SolLevante.y4m -b /dev/null --preset 4 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
  #     if: ${{ steps.build-znver2.outcome != 'failure' }}
  #   - run: cd Bin/Release && tar cJf Linux_x86-64_znver2.tar.xz SvtAv1EncApp && cd ../..
  #     if: ${{ steps.build-znver2.outcome != 'failure' }}
  #   - uses: softprops/action-gh-release@v3
  #     with:
  #       tag_name: ${{ needs.tag.outputs.tag }}
  #       files: Bin/Release/Linux_x86-64_znver2.tar.xz
  #     if: ${{ steps.build-znver2.outcome != 'failure' }}
  #   - run: Build/linux/build.sh --clean
    - run: CFLAGS="-DLIBDOVI_FOUND=1 -DLIBHDR10PLUS_RS_FOUND=1 $(pkg-config --cflags --static --dont-define-prefix rustlibs/lib/pkgconfig/dovi.pc) $(pkg-config --cflags --static --dont-define-prefix rustlibs/lib/pkgconfig/hdr10plus-rs.pc) -flto=full -march=x86-64-v3 -mtune=x86-64 -mno-gather -fno-exceptions -fno-rtti -DNDEBUG" CPPFLAGS="-DLIBDOVI_FOUND=1 -DLIBHDR10PLUS_RS_FOUND=1 $(pkg-config --cflags --static --dont-define-prefix rustlibs/lib/pkgconfig/dovi.pc) $(pkg-config --cflags --static --dont-define-prefix rustlibs/lib/pkgconfig/hdr10plus-rs.pc) -flto=full -march=x86-64-v3 -mtune=x86-64 -mno-gather -fno-exceptions -fno-rtti -DNDEBUG" LDFLAGS="-fuse-ld=lld $(pkg-config --libs --static --dont-define-prefix rustlibs/lib/pkgconfig/dovi.pc) $(pkg-config --libs --static --dont-define-prefix rustlibs/lib/pkgconfig/hdr10plus-rs.pc) -flto=full" Build/linux/build.sh --verbose --static --release --disable-native --enable-avx512 --disable-lto --enable-pgo --pgo-videos="$(realpath SolLevante)"
    - run: ldd Bin/Release/SvtAv1EncApp
    - run: Bin/Release/SvtAv1EncApp -i SolLevante/SolLevante.y4m -b test.ivf --preset 4 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
    - run: cd Bin/Release && tar cJf Linux_x86-64_x86-64-v3.tar.xz SvtAv1EncApp && cd ../..
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: Bin/Release/Linux_x86-64_x86-64-v3.tar.xz


