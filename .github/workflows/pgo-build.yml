# To build it yourself, always use clang over gcc or msvc, and ideally LLVM project's clang over other variants of clang. It's plain faster.
# Run `Build/linux/build.sh --native --static --release --enable-lto --enable-pgo` to build a decent binary.
# For more optimised building, check how we do it below. Everything here is not selected on a whim but tested to indeed produce a faster binary.
# Thanks to studies and contributions from afed, Ironclad, Itachi Uchiha, Miss Ashenlight, SwareJonge, Trix, Yiss and other people in the community to discover the method to build the fastest binary.

name: pgo-build
on: push # testing only
# on: workflow_dispatch # eventually

jobs:
  tag:
    runs-on: "ubuntu-latest"
    outputs:
      tag: ${{ steps.generate.outputs.tag }}
    steps:
    - uses: actions/checkout@v7
    - id: generate
      run: echo tag=v$(git log -1 "--date=format:%y%m%d" "--format=2.3.%ad") >> "$GITHUB_OUTPUT"


  release:
    needs: tag
    runs-on: "ubuntu-latest"
    steps:
    - uses: actions/checkout@v7
    - run: GH_TOKEN=${{ github.token }} gh release delete ${{ needs.tag.outputs.tag }} --cleanup-tag
      continue-on-error: true
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        target_commitish: ${{ github.sha }}
        name: 5fish/SVT-AV1 ${{ needs.tag.outputs.tag }}
        body: |
          Ref `${{ github.ref }}` | Commit `${{ github.sha }}`  
          Windows | x86-64 | LLVM Project Clang LLD | Winthread | `icelake-server` + `znver5` | PGO  
          Windows | x86-64 | LLVM Project Clang LLD | Winthread | `znver2` | PGO  
          Windows | x86-64 | LLVM Project Clang LLD | Winthread | `x86-64-v3` | PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `icelake-server` + `znver5` | PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `znver2` | PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `x86-64-v3` | PGO  
          macOS | arm64 | LLVM Project Clang LLD | `armv8.7-a` + `apple-m3` | PGO  
          macOS | x86-64 | LLVM Project Clang LLD | `skylake` | PGO  

          On x86-64 systems, no matter if you're on an Intel or AMD system, you should try these builds in the order of `icelake-server` + `znver5` ⇒ `znver2` ⇒ `x86-64-v3`. The `icelake-server` + `znver5` version might not be available if the GitHub Actions runner doesn't support AVX512.  

          Thanks to studies and contributions from afed, Ironclad, Itachi Uchiha, Miss Ashenlight, SwareJonge, Trix, Yiss and other people in the community to discover the method to build the fastest binary. If you need to build a binary yourself, check [the note](https://github.com/5fish/SVT-AV1/blob/${{ github.sha }}/.github/workflows/pgo-build.yml#L1-L4) in the building script.  
        prerelease: false
        make_latest: "true"


  # TODO: Test @latest

  # TODO: Test out MCF Gthread
  build-windows-x86-64:
    needs: [tag, release]
    runs-on: "windows-latest"
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: msys2/setup-msys2@latest
      with:
        msystem: CLANG64
        path-type: inherit
        install: >-
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-fastfetch
          mingw-w64-clang-x86_64-mcfgthread
          mingw-w64-clang-x86_64-mcfgthread-libs
          mingw-w64-clang-x86_64-nasm
          mingw-w64-clang-x86_64-toolchain
          ^mingw-w64-clang-x86_64-libwinpthread
          ^mingw-w64-clang-x86_64-winpthreads
    - run: fastfetch
    - uses: actions/checkout@latest
    - uses: actions/checkout@latest
      with:
        path: SolLevante
        ref: sollevante
    - run: xz --decompress SolLevante/SolLevante.y4m.xz
    - run: CFLAGS="-flto=full -march=znver2 -mtune=znver2 -fno-exceptions -fno-rtti -DNDEBUG" CPPFLAGS="-flto=full -march=znver2 -mtune=znver2 -fno-exceptions -fno-rtti -DNDEBUG" LDFLAGS="-fuse-ld=lld -flto=full" Build/linux/build.sh --verbose --static --release --disable-native --enable-avx512 --disable-lto --enable-pgo --pgo-videos="$(realpath SolLevante)"
    - run: Bin/Release/SvtAv1EncApp -i SolLevante/SolLevante.y4m -b test.ivf --preset 4 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
    - run: cd Bin/Release && tar cJf Windows_x86-64_znver2.tar.xz SvtAv1EncApp && cd ../..
    - uses: softprops/action-gh-release@latest
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: Bin/Release/Windows_x86-64_znver2.tar.xz


