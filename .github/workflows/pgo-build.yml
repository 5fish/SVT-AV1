# To build it yourself, always use clang over gcc or msvc. It's plain faster.
# Run `Build/linux/build.sh --native --static --release --enable-lto --enable-pgo` to build a decent binary.
# For more optimised building, check how we do it below. Everything here is not selected on a whim but tested to indeed produce a faster binary thanks to everybody in this community.
# Thanks to studies and contributions from afed, Ironclad, Itachi Uchiha, Miss Ashenlight, SwareJonge, Trix, Yiss and other people in the community to discover the method to build the fastest binary.

name: pgo-build
on: push # testing only
# on: workflow_dispatch # eventually

jobs:
  tag:
    runs-on: "ubuntu-latest"
    outputs:
      tag: ${{ steps.generate.outputs.tag }}
    steps:
    - uses: actions/checkout@v7
    - id: generate
      run: echo tag=v$(git log -1 "--date=format:%y%m%d" "--format=2.3.%ad") >> "$GITHUB_OUTPUT"


  release:
    needs: tag
    runs-on: "ubuntu-latest"
    steps:
    - uses: actions/checkout@v7
    - run: GH_TOKEN=${{ github.token }} gh release delete ${{ needs.tag.outputs.tag }} --cleanup-tag
      continue-on-error: true
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        target_commitish: ${{ github.sha }}
        name: 5fish/SVT-AV1 ${{ needs.tag.outputs.tag }}
        body: |
          Ref `${{ github.ref }}` | Commit `${{ github.sha }}`  
          Windows | x86-64 | LLVM Project `clang-cl` LLD | `znver2` | PGO  
          Windows | x86-64 | LLVM Project `clang-cl` LLD | `x86-64-v3` | PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `znver2` | PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `x86-64-v3` | PGO  
          macOS | arm64 | LLVM Project Clang LLD | `armv8.7-a` + `apple-m3` | PGO  
          macOS | x86-64 | LLVM Project Clang LLD | `skylake` | PGO  

          Thanks to studies and contributions from afed, Ironclad, Itachi Uchiha, Miss Ashenlight, SwareJonge, Trix, Yiss and other people in the community to discover the method to build the fastest binary. If you need to build a binary yourself, check [the note](https://github.com/5fish/SVT-AV1/blob/${{ github.sha }}/.github/workflows/pgo-build.yml#L1-L4) in the building script.  
        prerelease: false
        make_latest: "true"


  build-windows-x86-64:
    needs: [tag, release]
    runs-on: "windows-latest"
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          base-devel
          cmake
          mingw-w64-ucrt-x86_64-fastfetch
          git
          nasm
    - run: fastfetch
    - uses: actions/checkout@v7
    - uses: actions/checkout@v7
      with:
        path: SolLevante
        ref: sollevante
    - run: xz --decompress SolLevante/SolLevante.y4m.xz
    - id: install-llvm-30
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "30"
      continue-on-error: true
    - id: install-llvm-29
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-30.outcome == 'failure' }}
      with:
        version: "29"
      continue-on-error: true
    - id: install-llvm-28
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-29.outcome == 'failure' }}
      with:
        version: "28"
      continue-on-error: true
    - id: install-llvm-27
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-28.outcome == 'failure' }}
      with:
        version: "27"
      continue-on-error: true
    - id: install-llvm-26
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-27.outcome == 'failure' }}
      with:
        version: "26"
      continue-on-error: true
    - id: install-llvm-25
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-26.outcome == 'failure' }}
      with:
        version: "25"
      continue-on-error: true
    - id: install-llvm-24
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-25.outcome == 'failure' }}
      with:
        version: "24"
      continue-on-error: true
    - id: install-llvm-23
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-24.outcome == 'failure' }}
      with:
        version: "23"
      continue-on-error: true
    - id: install-llvm-22
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-23.outcome == 'failure' }}
      with:
        version: "22"
      continue-on-error: true
    - id: install-llvm-21
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-22.outcome == 'failure' }}
      with:
        version: "21"
      continue-on-error: true
    - id: install-llvm-20
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-21.outcome == 'failure' }}
      with:
        version: "20"
    - run: ls "C:/Program Files/LLVM"
    - run: ls "C:/Program Files/LLVM/bin"
    - run: find "/c/Program Files/LLVM" -type f -name "clang-cl"
    - run: PATH="C:/Program Files/LLVM/bin:$PATH" CC=clang-cl CXX=clang-cl CFLAGS="-IC:/Program Files/LLVM/include -flto=full -march=znver2 -mtune=znver2 -fno-exceptions -fno-rtti" CPPFLAGS="-IC:/Program Files/LLVM/include -flto=full -march=znver2 -mtune=znver2 -fno-exceptions -fno-rtti" LDFLAGS="-LC:/Program Files/LLVM/lib -fuse-ld=lld -flto=full" Build/linux/build.sh --verbose --static --release --disable-native --enable-avx512 --disable-lto --enable-pgo --pgo-videos="$(realpath SolLevante)"
    - run: Bin/Release/SvtAv1EncApp.exe -i SolLevante/SolLevante.y4m -b test.ivf --preset 2 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
    - run: cd Bin/Release && tar cJf Windows_x86-64_znver2.tar.xz SvtAv1EncApp.exe && cd ../..
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: Bin/Release/Windows_x86-64_znver2.tar.xz


