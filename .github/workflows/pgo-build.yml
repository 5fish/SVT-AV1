  build-macos-arm64:
    needs: [tag, release]
    runs-on: "macos-latest"
    steps:
    - uses: ConorMacBride/install-package@v1
      with:
        brew: fastfetch
    - run: fastfetch
    - uses: actions/checkout@v7
    - uses: actions/checkout@v7
      with:
        path: SolLevante
        ref: sollevante
    - run: xz --decompress SolLevante/SolLevante.y4m.xz
    - uses: ilammy/setup-nasm@v1
    - uses: ConorMacBride/install-package@v1
      with:
        brew: llvm lld
    - run: PATH="/opt/homebrew/opt/llvm/bin:$PATH" CMAKE_PREFIX_PATH="/opt/homebrew/opt/llvm" CFLAGS="-I/opt/homebrew/opt/llvm/include -march=armv8.7-a -flto=full -mtune=apple-m3 -fno-exceptions -fno-rtti" CPPFLAGS="-I/opt/homebrew/opt/llvm/include -flto=full -march=armv8.7-a -mtune=apple-m3 -fno-exceptions -fno-rtti" LDFLAGS="-L/opt/homebrew/opt/llvm/lib -fuse-ld=lld -flto=full" Build/linux/build.sh --verbose --static --release --disable-native --enable-lto --enable-pgo --pgo-videos="$(realpath SolLevante)"
    - run: Bin/Release/SvtAv1EncApp -i SolLevante/SolLevante.y4m -b test.ivf --preset 2 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
    - run: cd Bin/Release && tar cJf macOS_arm64_armv8.7-a+apple-m3.tar.xz SvtAv1EncApp && cd ../..
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: Bin/Release/macOS_arm64_armv8.7-a+apple-m3.tar.xz

