jobs:
  build:
    runs-on: "macos-latest"
    steps:
    - uses: actions/checkout@v6
    - uses: actions/checkout@v6
      with:
        path: SolLevante
        ref: sollevante
    - run: xz --decompress SolLevante/SolLevante.y4m.xz
    - uses: ilammy/setup-nasm@v1
    - uses: ConorMacBride/install-package@v1
      with:
        brew: llvm
    - run: CC=/opt/homebrew/bin/clang CXX=/opt/homebrew/bin/clang++ Build/linux/build.sh --verbose --native --static --release --enable-lto --enable-pgo --pgo-videos="$(realpath SolLevante)"
    - uses: actions/upload-artifact@v7
      with:
        path: Bin/Release/SvtAv1EncApp
